 <h1 class="title">Rock Paper Sissors</h1>

   play('rock');

  play('paper');

<p class="js-res result"></p>

<button onclick="
score.wins=0;
score.lose=0;
score.tie=0;

updatescore();
" class="reset">Reset Score</button>
